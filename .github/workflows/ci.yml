name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Enables the "Run workflow" button in the GitHub Actions tab so CI can be
  # triggered manually on any branch without needing a push or a pull request.
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Type-check
        run: npm run typecheck

      - name: Run all tests
        run: npm test
        env:
          # Optional: set in GitHub repo secrets to raise rate limit from 60 to 5000 req/hr
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload JUnit XML on every run (pass or fail) so CI tooling always has
      # structured test counts, durations, and failure details to parse.
      - name: Upload JUnit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: test-results/results.xml
          retention-days: 30

      # Upload the full HTML report only on failure for deeper investigation.
      - name: Upload HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
